<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PetShare 寵物分享交流平台</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Microsoft JhengHei", sans-serif;
    }

    body{
      background:#fff7f2;
      color:#444;
    }

    /* Navbar */
    nav{
      width:100%;
      background:#ffbfa3;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:1000;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:white;
    }

    .nav-btn{
      background:white;
      border:none;
      padding:10px 18px;
      border-radius:30px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .nav-btn:hover{
      transform:scale(1.05);
      background:#ffe5d8;
    }

    /* Container */
    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
      padding:30px 0;
    }

    /* Card */
    .card{
      background:white;
      border-radius:20px;
      padding:25px;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
      margin-bottom:25px;
      animation:fadeIn 0.5s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h2{
      margin-bottom:20px;
      color:#ff8e6e;
    }

    input, textarea{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ddd;
      margin-bottom:15px;
      outline:none;
      font-size:15px;
    }

    textarea{
      resize:none;
      height:120px;
    }

    .btn{
      background:#ff9e80;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:30px;
      cursor:pointer;
      transition:0.3s;
      font-size:15px;
      font-weight:bold;
    }

    .btn:hover{
      background:#ff7f5c;
      transform:scale(1.03);
    }

    /* Profile */
    .profile{
      display:flex;
      align-items:center;
      gap:15px;
      margin-bottom:20px;
    }

    .profile img{
      width:70px;
      height:70px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #ffd4c2;
    }

    /* Post */
    .post-img{
      width:100%;
      border-radius:15px;
      margin-top:15px;
      max-height:400px;
      object-fit:cover;
    }

    .post-actions{
      display:flex;
      gap:20px;
      margin-top:15px;
      font-size:18px;
    }

    .action{
      cursor:pointer;
      transition:0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .action:hover{
      transform:scale(1.1);
      color:#ff7f5c;
    }

    .comment-box{
      margin-top:15px;
    }

    .comment{
      background:#fff2ec;
      padding:10px;
      border-radius:10px;
      margin-top:10px;
    }

    .hidden{
      display:none;
    }

    .center{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .welcome{
      text-align:center;
      margin-bottom:30px;
    }

    .welcome h1{
      font-size:40px;
      color:#ff8e6e;
      margin-bottom:10px;
    }

    .welcome p{
      color:#666;
    }

    @media(max-width:768px){

      .profile{
        flex-direction:column;
        text-align:center;
      }

      nav{
        flex-direction:column;
        gap:10px;
      }

    }

    /* Modal / Captcha */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .captcha-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
      transform: translateY(-20px);
      transition: 0.3s;
      width: 90%;
      max-width: 400px;
    }

    .modal-overlay.active .captcha-box {
      transform: translateY(0);
    }

    .captcha-title {
      font-size: 20px;
      color: #ff8e6e;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .captcha-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .captcha-item {
      font-size: 50px;
      background: #fff7f2;
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .captcha-item:hover {
      background: #ffe5d8;
      border-color: #ffbfa3;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Captcha Modal -->
  <div id="captchaModal" class="modal-overlay">
    <div class="captcha-box">
      <div class="captcha-title">為保護帳號安全，請進行驗證</div>
      <p id="captchaInstruction">請點擊以下圖片中的【...】</p>
      <div id="captchaGrid" class="captcha-grid">
        <!-- Rendered by JS -->
      </div>
      <button class="btn" style="margin-top:20px; width:100%; background:#ccc;" onclick="closeCaptcha()">取消登入</button>
    </div>
  </div>

  <!-- Navbar -->
  <nav>
    <div class="logo">
      <i class="fa-solid fa-paw"></i> PetShare
    </div>

    <div>
      <button class="nav-btn" onclick="showPage('loginPage')">登入</button>
      <button class="nav-btn" onclick="showPage('registerPage')">註冊</button>
      <button class="nav-btn" onclick="logout()">登出</button>
    </div>
  </nav>

  <div class="container">

    <!-- Welcome -->
    <div class="welcome">
      <h1>🐶 歡迎來到 PetShare 🐱</h1>
      <p>分享你的可愛毛孩日常！</p>
    </div>

    <!-- Register -->
    <div id="registerPage" class="card">
      <h2>註冊帳號</h2>

      <input type="text" id="regId" placeholder="輸入ID">
      <input type="text" id="regName" placeholder="輸入名稱">
      <input type="password" id="regPassword" placeholder="輸入密碼">
      <input type="file" id="regAvatar">

      <button class="btn" onclick="register()">註冊</button>
    </div>

    <!-- Login -->
    <div id="loginPage" class="card hidden">
      <h2>會員登入</h2>

      <input type="text" id="loginId" placeholder="輸入ID">
      <input type="password" id="loginPassword" placeholder="輸入密碼">

      <button class="btn" onclick="login()">登入</button>
    </div>

    <!-- Home -->
    <div id="homePage" class="hidden">

      <!-- Profile -->
      <div class="card">

        <div class="profile">
          <img id="profileAvatar" src="">
          <div>
            <h2 id="profileName"></h2>
            <p id="profileId"></p>
          </div>
        </div>

        <button class="btn" onclick="showPostPage()">
          <i class="fa-solid fa-plus"></i>
          新增貼文
        </button>

      </div>

      <!-- Post Create -->
      <div id="postPage" class="card hidden">

        <h2>發布貼文</h2>

        <input type="text" id="postTitle" placeholder="發布主題">

        <textarea id="postContent"
          placeholder="分享你的毛孩日常吧！"></textarea>

        <input type="file" id="postImage">

        <button class="btn" onclick="createPost()">
          發布貼文
        </button>

      </div>

      <!-- My Posts -->
      <div class="card">
        <h2>我的貼文</h2>
        <div id="myPosts"></div>
      </div>

    </div>

    <!-- Share Area -->
    <div class="card">
      <h2>分享區</h2>
      <div id="allPosts"></div>
    </div>

  </div>

  <script>

    let users = JSON.parse(localStorage.getItem("users")) || [];
    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));

    function saveData(){
      localStorage.setItem("users", JSON.stringify(users));
      localStorage.setItem("posts", JSON.stringify(posts));
    }

    function showPage(pageId){

      document.getElementById("registerPage").classList.add("hidden");
      document.getElementById("loginPage").classList.add("hidden");

      document.getElementById(pageId).classList.remove("hidden");
    }

    // Register
    function register(){

      const id = document.getElementById("regId").value;
      const name = document.getElementById("regName").value;
      const password = document.getElementById("regPassword").value;
      const avatarFile = document.getElementById("regAvatar").files[0];

      if(!id || !name || !password){
        alert("請填寫完整資料！");
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e){

        const user = {
          id,
          name,
          password,
          avatar:e.target.result
        };

        users.push(user);

        saveData();

        alert("註冊成功！");

        showPage("loginPage");
      }

      if(avatarFile){
        reader.readAsDataURL(avatarFile);
      }else{

        const user = {
          id,
          name,
          password,
          avatar:"https://cdn-icons-png.flaticon.com/512/616/616408.png"
        };

        users.push(user);

        saveData();

        alert("註冊成功！");

        showPage("loginPage");
      }

    }

    // Login
    let pendingLoginUser = null;

    function login(){

      const id = document.getElementById("loginId").value;
      const password = document.getElementById("loginPassword").value;

      const user = users.find(
        u => u.id === id && u.password === password
      );

      if(user){
        pendingLoginUser = user;
        showCaptcha();
      }else{
        alert("帳號或密碼錯誤！");
      }
    }

    // Captcha Logic
    let targetAnimal = "";
    const animals = [
      { name: "狗", icon: "🐶" },
      { name: "貓", icon: "🐱" },
      { name: "兔子", icon: "🐰" },
      { name: "鳥", icon: "🐦" },
      { name: "倉鼠", icon: "🐹" },
      { name: "熊", icon: "🐻" },
      { name: "老虎", icon: "🐯" },
      { name: "青蛙", icon: "🐸" }
    ];

    function showCaptcha() {
      const modal = document.getElementById("captchaModal");
      const grid = document.getElementById("captchaGrid");
      const instruction = document.getElementById("captchaInstruction");
      
      const shuffled = [...animals].sort(() => 0.5 - Math.random());
      const selectedAnimals = shuffled.slice(0, 4);
      
      const target = selectedAnimals[Math.floor(Math.random() * selectedAnimals.length)];
      targetAnimal = target.name;
      
      instruction.innerHTML = `請點擊以下圖片中的 <strong>【${targetAnimal}】</strong>`;
      
      grid.innerHTML = "";
      selectedAnimals.forEach(animal => {
        const div = document.createElement("div");
        div.className = "captcha-item";
        div.innerText = animal.icon;
        div.onclick = () => verifyCaptcha(animal.name);
        grid.appendChild(div);
      });
      
      modal.classList.add("active");
    }

    function verifyCaptcha(selectedName) {
      if (selectedName === targetAnimal) {
        document.getElementById("captchaModal").classList.remove("active");
        
        currentUser = pendingLoginUser;
        localStorage.setItem(
          "currentUser",
          JSON.stringify(currentUser)
        );
        
        alert("驗證通過，登入成功！");
        loadProfile();
      } else {
        alert("驗證失敗，請重試！");
        showCaptcha();
      }
    }

    function closeCaptcha() {
      document.getElementById("captchaModal").classList.remove("active");
      pendingLoginUser = null;
    }

    // Load Profile
    function loadProfile(){

      document.getElementById("homePage")
        .classList.remove("hidden");

      document.getElementById("profileAvatar")
        .src = currentUser.avatar;

      document.getElementById("profileName")
        .innerText = currentUser.name;

      document.getElementById("profileId")
        .innerText = "@" + currentUser.id;

      renderPosts();
    }

    // Logout
    function logout(){

      localStorage.removeItem("currentUser");

      currentUser = null;

      alert("已登出");

      location.reload();
    }

    // Show Post Page
    function showPostPage(){

      if(!currentUser){
        alert("請先登入！");
        return;
      }

      document.getElementById("postPage")
        .classList.toggle("hidden");
    }

    // Create Post
    function createPost(){

      const title = document.getElementById("postTitle").value;
      const content = document.getElementById("postContent").value;
      const imageFile = document.getElementById("postImage").files[0];

      if(!title || !content){
        alert("請填寫完整貼文！");
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e){

        const post = {
          userId:currentUser.id,
          userName:currentUser.name,
          avatar:currentUser.avatar,
          title,
          content,
          image:imageFile ? e.target.result : "",
          likes:0,
          comments:[]
        };

        posts.unshift(post);

        saveData();

        renderPosts();

        alert("發布成功！");

      }

      if(imageFile){
        reader.readAsDataURL(imageFile);
      }else{
        reader.onload({target:{result:""}});
      }

    }

    // Render Posts
    function renderPosts(){

      const allPosts = document.getElementById("allPosts");
      const myPosts = document.getElementById("myPosts");

      allPosts.innerHTML = "";
      myPosts.innerHTML = "";

      posts.forEach((post,index)=>{

        const postHTML = `
          <div class="card">

            <div class="profile">
              <img src="${post.avatar}">
              <div>
                <h3>${post.userName}</h3>
                <p>@${post.userId}</p>
              </div>
            </div>

            <h3>${post.title}</h3>
            <p>${post.content}</p>

            ${
              post.image ?
              `<img src="${post.image}" class="post-img">`
              : ""
            }

            <div class="post-actions">

              <div class="action"
                onclick="likePost(${index})">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                ${post.likes}
              </div>

              <div class="action">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/>
                </svg>
              </div>

            </div>

            <div class="comment-box">

              <input
                type="text"
                id="comment-${index}"
                placeholder="輸入留言..."
              >

              <button class="btn"
                onclick="addComment(${index})">
                留言
              </button>

              <div>
                ${post.comments.map(comment => `
                  <div class="comment">
                    <strong>${comment.user}</strong>
                    <p>${comment.text}</p>
                  </div>
                `).join("")}
              </div>

            </div>

          </div>
        `;

        allPosts.innerHTML += postHTML;

        if(currentUser &&
          post.userId === currentUser.id){

          myPosts.innerHTML += postHTML;
        }

      });

    }

    // Like
    function likePost(index){

      if(!currentUser){
        alert("請先登入會員！");
        return;
      }

      posts[index].likes++;

      saveData();

      renderPosts();
    }

    // Comment
    function addComment(index){

      if(!currentUser){

        alert("是否已有平台帳號？請先登入！");
        showPage("loginPage");

        return;
      }

      const input = document.getElementById(
        `comment-${index}`
      );

      const text = input.value;

      if(!text){
        alert("請輸入留言！");
        return;
      }

      posts[index].comments.push({
        user:currentUser.name,
        text:text
      });

      saveData();

      renderPosts();
    }

    // Auto Login
    if(currentUser){
      loadProfile();
    }

    renderPosts();

  </script>

</body>
</html>
